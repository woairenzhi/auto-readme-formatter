name: "Auto README Formatter"
description: "Automatically formats README.md files: generates TOC, normalizes whitespace, standardizes badges, and adds GitHub Sponsors link."
author: "woairenzhi"
branding:
  icon: "book-open"
  color: "blue"
inputs:
  file-path:
    description: "Path to the README file to format"
    required: false
    default: "README.md"
  generate-toc:
    description: "Generate a table of contents"
    required: false
    default: "true"
  fix-whitespace:
    description: "Fix trailing whitespace and ensure consistent line endings"
    required: false
    default: "true"
  standardize-badges:
    description: "Standardize badge formatting"
    required: false
    default: "true"
  add-sponsors-link:
    description: "Add GitHub Sponsors link section"
    required: false
    default: "true"
  commit-message:
    description: "Commit message for auto-commit changes"
    required: false
    default: "chore: auto-format README.md"
runs:
  using: "node20"
  main: "dist/index.js"
